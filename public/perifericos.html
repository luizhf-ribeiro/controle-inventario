<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periféricos | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style> body { font-family: 'Inter', system_ui, sans-serif; } </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-[#1a2537] text-white flex flex-col">
        <div class="p-6 border-b border-[#2a3a50]">
            <div class="text-2xl font-bold">Hepta / Cetesb</div>
            <div class="text-sm text-blue-400 mt-1">Controle de Inventário</div>
        </div>
        <nav class="flex-1 p-4">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="equipamentos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-laptop"></i> Equipamentos</a>
            <a href="perifericos.html" class="flex items-center gap-3 px-4 py-3 bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-mouse"></i> Periféricos</a>
            <a href="componentes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-microchip"></i> Componentes</a>
            <a href="usuarios.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl"><i class="fas fa-users"></i> Usuários</a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Sair</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-semibold">Periféricos</h1>
        </header>

        <div class="p-8 overflow-auto">
            <!-- Filtros -->
            <div class="bg-white p-4 rounded-2xl shadow mb-6 grid grid-cols-2 md:grid-cols-6 gap-3">
                <input type="text" id="filtroTipo" placeholder="Tipo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroMarca" placeholder="Marca" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroModelo" placeholder="Modelo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroUsuario" placeholder="Usuário Responsável" class="px-4 py-3 border rounded-xl">
                <select id="filtroStatus" class="px-4 py-3 border rounded-xl">
                    <option value="">Todos os Status</option>
                    <option value="Disponível">Disponível</option>
                    <option value="Em uso">Em uso</option>
                    <option value="Manutenção">Em Manutenção</option>
                </select>
                <button onclick="carregarTabela()" 
                        class="bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 flex items-center justify-center gap-2">
                    <i class="fas fa-filter"></i> Filtrar
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left">Tipo</th>
                            <th class="px-6 py-4 text-left">Marca / Modelo</th>
                            <th class="px-6 py-4 text-left">Usuário</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPerifericos" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalCadastro" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg">
            <h2 class="text-2xl font-semibold mb-6" id="modalTitle">Novo Periférico</h2>
            <form id="formPeriferico">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Tipo</label>
                        <input type="text" id="tipo" class="w-full p-3 border rounded-xl" placeholder="Ex: Mouse, Teclado, Monitor" required>
                    </div>
                    <div><label class="block text-sm mb-1">Marca</label><input type="text" id="marca" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Modelo</label><input type="text" id="modelo" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Patrimônio</label><input type="text" id="patrimonio" class="w-full p-3 border rounded-xl"></div>
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Status</label>
                        <select id="status" class="w-full p-3 border rounded-xl">
                            <option value="Disponível">Disponível</option>
                            <option value="Em uso">Em uso</option>
                            <option value="Manutenção">Em Manutenção</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Usuário Responsável</label>
                        <input type="text" id="usuario" class="w-full p-3 border rounded-xl">
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="fecharModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl" id="btnSalvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let editandoId = null;

        async function carregarTabela() {
            try {
                const res = await fetch('/api/perifericos');
                const itens = await res.json();

                document.getElementById('tabelaPerifericos').innerHTML = itens.map(i => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">${i.tipo || '---'}</td>
                        <td class="px-6 py-4">${(i.marca || '')} ${(i.modelo || '')}</td>
                        <td class="px-6 py-4">${i.usuarioResponsavel || i.usuario || '---'}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs 
                                ${i.status === 'Disponível' ? 'bg-green-100 text-green-700' : 
                                  i.status === 'Em uso' ? 'bg-yellow-100 text-yellow-700' : 
                                  'bg-red-100 text-red-700'}">
                                ${i.status || '---'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="editar(${i.id})" class="text-blue-600 hover:text-blue-800 mr-3"><i class="fas fa-edit"></i></button>
                            <button onclick="excluir(${i.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5" class="text-center py-12 text-gray-500">Nenhum periférico encontrado.</td></tr>';
            } catch (error) {
                console.error(error);
                document.getElementById('tabelaPerifericos').innerHTML = `<tr><td colspan="5" class="text-center py-12 text-red-500">Erro ao carregar dados</td></tr>`;
            }
        }

        async function editar(id) {
            try {
                const res = await fetch(`/api/perifericos/${id}`);
                if (!res.ok) throw new Error();
                const i = await res.json();

                document.getElementById('tipo').value = i.tipo || '';
                document.getElementById('marca').value = i.marca || '';
                document.getElementById('modelo').value = i.modelo || '';
                document.getElementById('patrimonio').value = i.patrimonio || '';
                document.getElementById('status').value = i.status || 'Disponível';
                document.getElementById('usuario').value = i.usuarioResponsavel || i.usuario || '';

                editandoId = id;
                document.getElementById('modalTitle').textContent = "Editar Periférico";
                document.getElementById('btnSalvar').textContent = "Atualizar";
                document.getElementById('modalCadastro').classList.remove('hidden');
            } catch (error) {
                alert("Erro ao carregar dados para edição.");
            }
        }

        document.getElementById('formPeriferico').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                tipo: document.getElementById('tipo').value,
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                patrimonio: document.getElementById('patrimonio').value,
                status: document.getElementById('status').value,
                usuarioResponsavel: document.getElementById('usuario').value
            };

            const url = editandoId ? `/api/perifericos/${editandoId}` : '/api/perifericos';
            const method = editandoId ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            alert("✅ Salvo com sucesso!");
            fecharModal();
            carregarTabela();
        });

        async function excluir(id) {
            if (confirm("Deseja excluir este periférico?")) {
                await fetch(`/api/perifericos/${id}`, { method: 'DELETE' });
                carregarTabela();
            }
        }

        function fecharModal() {
            document.getElementById('modalCadastro').classList.add('hidden');
            document.getElementById('formPeriferico').reset();
            editandoId = null;
            document.getElementById('modalTitle').textContent = "Novo Periférico";
            document.getElementById('btnSalvar').textContent = "Salvar";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        window.onload = carregarTabela;
    </script>
</body>
</html>

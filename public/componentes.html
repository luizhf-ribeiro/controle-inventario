<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style> body { font-family: 'Inter', system_ui, sans-serif; } </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar (mesmo de antes) -->
    <div class="w-64 bg-[#1a2537] text-white flex flex-col">
        <div class="p-6 border-b border-[#2a3a50]">
            <div class="text-2xl font-bold">Hepta / Cetesb</div>
            <div class="text-sm text-blue-400 mt-1">Controle de Inventário</div>
        </div>
        <nav class="flex-1 p-4">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="equipamentos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-laptop"></i> Equipamentos</a>
            <a href="perifericos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-mouse"></i> Periféricos</a>
            <a href="componentes.html" class="flex items-center gap-3 px-4 py-3 bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-microchip"></i> Componentes</a>
            <a href="usuarios.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl"><i class="fas fa-users"></i> Usuários</a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Sair</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-semibold">Componentes</h1>
        </header>

        <div class="p-8 overflow-auto">
            <div class="bg-white p-4 rounded-2xl shadow mb-6 grid grid-cols-2 md:grid-cols-6 gap-3">
                <input type="text" id="filtroTipo" placeholder="Tipo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroMarca" placeholder="Marca" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroModelo" placeholder="Modelo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroUsuario" placeholder="Usuário" class="px-4 py-3 border rounded-xl">
                <select id="filtroStatus" class="px-4 py-3 border rounded-xl">
                    <option value="">Todos os Status</option>
                    <option value="Disponível">Disponível</option>
                    <option value="Em uso">Em uso</option>
                    <option value="Manutenção">Em Manutenção</option>
                </select>
                <button onclick="carregarTabela()" class="bg-blue-600 text-white py-3 rounded-xl font-medium">Filtrar</button>
            </div>

            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left">Tipo</th>
                            <th class="px-6 py-4 text-left">Marca / Modelo</th>
                            <th class="px-6 py-4 text-left">Usuário</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaComponentes" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalCadastro" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg">
            <h2 class="text-2xl font-semibold mb-6" id="modalTitle">Novo Componente</h2>
            <form id="formComponente">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label>Tipo</label><input id="tipo" class="w-full p-3 border rounded-xl" required></div>
                    <div><label>Marca</label><input id="marca" class="w-full p-3 border rounded-xl" required></div>
                    <div><label>Modelo</label><input id="modelo" class="w-full p-3 border rounded-xl" required></div>
                    <div><label>Patrimônio</label><input id="patrimonio" class="w-full p-3 border rounded-xl"></div>
                    <div class="col-span-2"><label>Status</label>
                        <select id="status" class="w-full p-3 border rounded-xl">
                            <option value="Disponível">Disponível</option>
                            <option value="Em uso">Em uso</option>
                            <option value="Manutenção">Em Manutenção</option>
                        </select>
                    </div>
                    <div class="col-span-2"><label>Usuário</label><input id="usuario" class="w-full p-3 border rounded-xl"></div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="fecharModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let editandoId = null;

        async function carregarTabela() {
            try {
                const res = await fetch('/api/componentes');
                const data = await res.json();
                console.log("Dados recebidos:", data); // ← veja no console do navegador

                document.getElementById('tabelaComponentes').innerHTML = data.map(i => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">${i.tipo || '---'}</td>
                        <td class="px-6 py-4">${i.marca || ''} ${i.modelo || ''}</td>
                        <td class="px-6 py-4">${i.usuarioResponsavel || '---'}</td>
                        <td class="px-6 py-4">${i.status || '---'}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="editar(${i.id})" class="text-blue-600 mr-3"><i class="fas fa-edit"></i></button>
                            <button onclick="excluir(${i.id})" class="text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5" class="text-center py-12">Nenhum componente encontrado</td></tr>';
            } catch (e) {
                console.error(e);
                document.getElementById('tabelaComponentes').innerHTML = `<tr><td colspan="5" class="text-red-500 text-center py-12">Erro ao carregar</td></tr>`;
            }
        }

        async function editar(id) {
            const res = await fetch(`/api/componentes/${id}`);
            const i = await res.json();

            document.getElementById('tipo').value = i.tipo || '';
            document.getElementById('marca').value = i.marca || '';
            document.getElementById('modelo').value = i.modelo || '';
            document.getElementById('patrimonio').value = i.patrimonio || '';
            document.getElementById('status').value = i.status || '';
            document.getElementById('usuario').value = i.usuarioResponsavel || '';

            editandoId = id;
            document.getElementById('modalTitle').textContent = "Editar Componente";
            document.getElementById('modalCadastro').classList.remove('hidden');
        }

        document.getElementById('formComponente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                tipo: document.getElementById('tipo').value,
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                patrimonio: document.getElementById('patrimonio').value,
                status: document.getElementById('status').value,
                usuarioResponsavel: document.getElementById('usuario').value
            };

            const url = editandoId ? `/api/componentes/${editandoId}` : '/api/componentes';
            await fetch(url, { method: editandoId ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });

            alert("Salvo!");
            fecharModal();
            carregarTabela();
        });

        function fecharModal() {
            document.getElementById('modalCadastro').classList.add('hidden');
            document.getElementById('formComponente').reset();
            editandoId = null;
        }

        function excluir(id) {
            if (confirm("Excluir?")) fetch(`/api/componentes/${id}`, {method: 'DELETE'}).then(() => carregarTabela());
        }

        window.onload = carregarTabela;
    </script>
</body>
</html>

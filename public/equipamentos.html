<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamentos | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style> body { font-family: 'Inter', system_ui, sans-serif; } </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-[#1a2537] text-white flex flex-col">
        <div class="p-6 border-b border-[#2a3a50]">
            <div class="text-2xl font-bold">Hepta / Cetesb</div>
            <div class="text-sm text-blue-400 mt-1">Controle de Inventário</div>
        </div>
        <nav class="flex-1 p-4">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="equipamentos.html" class="flex items-center gap-3 px-4 py-3 bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-laptop"></i> Equipamentos</a>
            <a href="perifericos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-mouse"></i> Periféricos</a>
            <a href="componentes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-microchip"></i> Componentes</a>
            <a href="usuarios.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl"><i class="fas fa-users"></i> Usuários</a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Sair</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-semibold">Equipamentos</h1>
            <div class="flex items-center gap-4">
                <div id="adminButtons" class="flex gap-3"></div>
                <div id="userHeader" class="flex items-center gap-3 pl-6 border-l border-gray-200"></div>
            </div>
        </header>

        <div class="p-8 overflow-auto">
            <!-- FILTROS -->
            <div class="bg-white p-4 rounded-2xl shadow mb-6 grid grid-cols-2 md:grid-cols-7 gap-3">
                <input type="text" id="filtroPatrimonio" placeholder="Patrimônio" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroTipo" placeholder="Tipo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroMarca" placeholder="Marca" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroModelo" placeholder="Modelo" class="px-4 py-3 border rounded-xl">
                <input type="text" id="filtroUsuario" placeholder="Usuário Responsável" class="px-4 py-3 border rounded-xl">
                <select id="filtroStatus" class="px-4 py-3 border rounded-xl">
                    <option value="">Todos os Status</option>
                    <option value="Disponível">Disponível</option>
                    <option value="Em uso">Em uso</option>
                    <option value="Manutenção">Em Manutenção</option>
                    <option value="Offline">Offline</option>
                </select>
                <button onclick="carregarTabela()" class="bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 flex items-center justify-center gap-2">
                    <i class="fas fa-filter"></i> Filtrar
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left">Patrimônio</th>
                            <th class="px-6 py-4 text-left">Tipo</th>
                            <th class="px-6 py-4 text-left">Marca / Modelo</th>
                            <th class="px-6 py-4 text-left">Serial</th>
                            <th class="px-6 py-4 text-left">Usuário</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEquipamentos" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalCadastro" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg">
            <h2 class="text-2xl font-semibold mb-6" id="modalTitle">Novo Equipamento</h2>
            <form id="formEquipamento">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Tipo</label>
                        <select id="tipo" class="w-full p-3 border rounded-xl">
                            <option value="Notebook">Notebook</option>
                            <option value="Desktop">Desktop</option>
                            <option value="Monitor">Monitor</option>
                            <option value="Impressora">Impressora</option>
                        </select>
                    </div>
                    <div><label class="block text-sm mb-1">Marca</label><input type="text" id="marca" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Modelo</label><input type="text" id="modelo" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Patrimônio</label><input type="text" id="patrimonio" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Serial</label><input type="text" id="serial" class="w-full p-3 border rounded-xl"></div>
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Status</label>
                        <select id="status" class="w-full p-3 border rounded-xl">
                            <option value="Disponível">Disponível</option>
                            <option value="Em uso">Em uso</option>
                            <option value="Manutenção">Em Manutenção</option>
                            <option value="Offline">Offline</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm mb-1">Usuário Responsável</label>
                        <input type="text" id="usuario" class="w-full p-3 border rounded-xl">
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="fecharModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl" id="btnSalvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="importCSV" accept=".csv" class="hidden" onchange="importarCSV(event)">

    <script>
        let editId = null;
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{"nome":"Usuário","cargo":"Analista"}');

        function updateUserHeader() {
            document.getElementById('userHeader').innerHTML = `
                <i class="fas fa-bell text-2xl"></i>
                <div>
                    <p class="font-medium">${currentUser.nome}</p>
                    <p class="text-sm text-gray-500">${currentUser.cargo}</p>
                </div>
            `;
        }

        function showAdminButtons() {
            const container = document.getElementById('adminButtons');
            if (currentUser.cargo === 'Administrador') {
                container.innerHTML = `
                    <button onclick="exportarCSV()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-2xl font-medium flex items-center gap-2">
                        <i class="fas fa-download"></i> Exportar CSV
                    </button>
                    <button onclick="document.getElementById('importCSV').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl font-medium flex items-center gap-2">
                        <i class="fas fa-upload"></i> Importar CSV
                    </button>
                    <button onclick="abrirModalCadastro()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                        <i class="fas fa-plus"></i> Novo Equipamento
                    </button>
                `;
            }
        }

        async function carregarTabela() {
            try {
                const res = await fetch('/api/equipamentos');
                const equipamentos = await res.json();

                document.getElementById('tabelaEquipamentos').innerHTML = equipamentos.map(e => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">${e.patrimonio || '---'}</td>
                        <td class="px-6 py-4 font-medium">${e.tipo || '---'}</td>
                        <td class="px-6 py-4">${(e.marca || '')} ${(e.modelo || '')}</td>
                        <td class="px-6 py-4 text-gray-600">${e.serial || '---'}</td>
                        <td class="px-6 py-4 text-gray-500">${e.usuarioResponsavel || e.usuario || '---'}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-600">${e.status || 'Offline'}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="editar(${e.id})" class="text-blue-600 hover:text-blue-800 mr-3">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="excluir(${e.id})" class="text-red-600 hover:text-red-800">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Erro ao carregar equipamentos:", error);
            }
        }

        async function editar(id) {
            try {
                const res = await fetch(`/api/equipamentos/${id}`);
                if (!res.ok) throw new Error();
                const e = await res.json();

                document.getElementById('patrimonio').value = e.patrimonio || '';
                document.getElementById('tipo').value = e.tipo || '';
                document.getElementById('marca').value = e.marca || '';
                document.getElementById('modelo').value = e.modelo || '';
                document.getElementById('serial').value = e.serial || '';
                document.getElementById('status').value = e.status || 'Offline';
                document.getElementById('usuario').value = e.usuarioResponsavel || e.usuario || '';

                editId = id;
                document.getElementById('modalTitle').innerText = "Editar Equipamento";
                document.getElementById('btnSalvar').innerText = "Salvar Alterações";
                document.getElementById('modalCadastro').classList.remove('hidden');
            } catch (error) {
                alert("Erro ao buscar dados do equipamento.");
            }
        }

        document.getElementById('formEquipamento').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                patrimonio: document.getElementById('patrimonio').value,
                tipo: document.getElementById('tipo').value,
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                serial: document.getElementById('serial').value,
                status: document.getElementById('status').value,
                usuarioResponsavel: document.getElementById('usuario').value
            };

            const url = editId ? `/api/equipamentos/${editId}` : '/api/equipamentos';
            const method = editId ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            alert("✅ Salvo com sucesso!");
            fecharModal();
            carregarTabela();
        });

        function abrirModalCadastro() {
            editId = null;
            document.getElementById('modalTitle').innerText = "Novo Equipamento";
            document.getElementById('btnSalvar').innerText = "Salvar";
            document.getElementById('modalCadastro').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modalCadastro').classList.add('hidden');
            document.getElementById('formEquipamento').reset();
            editId = null;
        }

        async function excluir(id) {
            if (confirm("Deseja excluir este equipamento?")) {
                await fetch(`/api/equipamentos/${id}`, { method: 'DELETE' });
                carregarTabela();
            }
        }

        function exportarCSV() {
            fetch('/api/equipamentos').then(r => r.json()).then(data => {
                let csv = "Patrimonio,Tipo,Marca,Modelo,Serial,Usuario,Status\n";
                data.forEach(e => csv += `"${e.patrimonio}","${e.tipo}","${e.marca || ''}","${e.modelo || ''}","${e.serial || ''}","${e.usuarioResponsavel || ''}","${e.status}"\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'equipamentos.csv';
                a.click();
            });
        }

        function importarCSV(event) {
            alert("Funcionalidade de importação em desenvolvimento.");
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        window.onload = () => {
            updateUserHeader();
            showAdminButtons();
            carregarTabela();
        };
    </script>
</body>
</html>

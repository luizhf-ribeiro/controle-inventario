<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 flex h-screen">

    <div class="flex w-full">
        <!-- Lado esquerdo - Formulário -->
        <div class="w-full lg:w-5/12 bg-white flex items-center justify-center p-8">
            <div class="w-full max-w-md">
                <div class="flex justify-center mb-10">
                    <img src="./img/logo.png" alt="Hepta & Cetesb" class="h-20 w-auto">
                </div>
                
                <h1 class="text-3xl font-bold text-center mb-2">Bem-vindo</h1>
                <p class="text-gray-500 text-center mb-8">Sistema de Controle de Inventário</p>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                        <input type="email" id="email" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                               placeholder="seu.email@cetesb.sp.gov.br" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="password" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                               value="123" required>
                    </div>
                    <button type="submit"
                            class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-semibold text-lg transition">
                        Entrar no Sistema
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-8">
                    Senha padrão: <span class="font-mono">123</span>
                </p>
            </div>
        </div>

        <!-- Lado direito - Imagem -->
        <div class="hidden lg:flex w-7/12 bg-cover bg-center relative" 
             style="background-image: url('./img/portifolio.jpg');">
            <div class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent"></div>
            <div class="absolute bottom-12 left-12 text-white">
                <h2 class="text-4xl font-bold">Gestão Completa</h2>
                <p class="text-xl mt-2">Controle inteligente do seu inventário de TI</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Preencha email e senha");
                return;
            }

            // Simulação de login
            const userData = {
                nome: email.split('@')[0].replace('.', ' ').replace(/\b\w/g, l => l.toUpperCase()),
                email: email,
                cargo: email.includes("luiz.ribeiro") || email.includes("admin") ? "Administrador" : "Analista"
            };

            localStorage.setItem('currentUser', JSON.stringify(userData));
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>

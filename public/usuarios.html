<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style> body { font-family: 'Inter', system_ui, sans-serif; } </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-[#1a2537] text-white flex flex-col">
        <div class="p-6 border-b border-[#2a3a50]">
            <div class="text-2xl font-bold">Hepta / Cetesb</div>
            <div class="text-sm text-blue-400 mt-1">Controle de Inventário</div>
        </div>
        <nav class="flex-1 p-4">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="equipamentos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-laptop"></i> Equipamentos</a>
            <a href="perifericos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-mouse"></i> Periféricos</a>
            <a href="componentes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-microchip"></i> Componentes</a>
            <a href="usuarios.html" class="flex items-center gap-3 px-4 py-3 bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-users"></i> Usuários</a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Sair</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-semibold">Usuários</h1>
            <div class="flex items-center gap-4">
                <div id="adminButtons" class="flex gap-3"></div>
                <div id="userHeader" class="flex items-center gap-3 pl-6 border-l border-gray-200"></div>
            </div>
        </header>

        <div class="p-8 overflow-auto">
            <!-- FILTRO AJUSTADO -->
            <div class="bg-white p-4 rounded-2xl shadow mb-6 flex gap-4">
                <input type="text" id="filtroNome" placeholder="Buscar por nome..." 
                       class="flex-1 px-4 py-3 border rounded-xl">
                <button onclick="carregarTabela()" 
                        class="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-blue-700">
                    <i class="fas fa-filter"></i> Filtrar
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left">Nome</th>
                            <th class="px-6 py-4 text-left">Email</th>
                            <th class="px-6 py-4 text-left">Cargo</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalCadastro" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg">
            <h2 class="text-2xl font-semibold mb-6" id="modalTitle">Novo Usuário</h2>
            <form id="formUsuario">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm mb-1">Nome</label><input type="text" id="nome" class="w-full p-3 border rounded-xl" required></div>
                    <div><label class="block text-sm mb-1">Sobrenome</label><input type="text" id="sobrenome" class="w-full p-3 border rounded-xl" required></div>
                </div>
                <div class="mt-4">
                    <label class="block text-sm mb-1">Cargo</label>
                    <select id="cargo" class="w-full p-3 border rounded-xl">
                        <option value="Analista">Analista</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="fecharModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl" id="btnSalvar">Criar Usuário</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{"nome":"Usuário","cargo":"Analista"}');

        function updateUserHeader() {
            document.getElementById('userHeader').innerHTML = `
                <i class="fas fa-bell text-2xl"></i>
                <div>
                    <p class="font-medium">${currentUser.nome}</p>
                    <p class="text-sm text-gray-500">${currentUser.cargo}</p>
                </div>
            `;
        }

        function showAdminButtons() {
            const container = document.getElementById('adminButtons');
            container.innerHTML = currentUser.cargo === 'Administrador' ? `
                <button onclick="abrirModalCadastro()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fas fa-plus"></i> Novo Usuário
                </button>
            ` : '';
        }

        // ====================== FUNÇÃO COM FILTRO NO BACKEND ======================
        async function carregarTabela() {
            const nome = document.getElementById('filtroNome').value.trim();

            let url = '/api/usuarios';
            if (nome) {
                url += `?nome=${encodeURIComponent(nome)}`;
            }

            try {
                const res = await fetch(url);
                const usuarios = await res.json();

                document.getElementById('tabelaUsuarios').innerHTML = usuarios.map(u => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">${u.nome}</td>
                        <td class="px-6 py-4 font-mono">${u.email}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs ${u.cargo === 'Administrador' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}">
                                ${u.cargo}
                            </span>
                        </td>
                        <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">Ativo</span></td>
                        <td class="px-6 py-4 text-center">
                            ${currentUser.cargo === 'Administrador' ? `
                                <button onclick="editar(${u.id})" class="text-blue-600 hover:text-blue-800 mr-4"><i class="fas fa-edit"></i></button>
                                <button onclick="excluir(${u.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                            ` : ''}
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5" class="text-center py-12 text-gray-500">Nenhum usuário encontrado.</td></tr>';
            } catch (error) {
                console.error(error);
                alert("Erro ao carregar usuários");
            }
        }

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (currentUser.cargo !== 'Administrador') return alert("Apenas Administradores podem criar usuários.");

            const nome = document.getElementById('nome').value;
            const sobrenome = document.getElementById('sobrenome').value;
            const data = {
                nome: `${nome} ${sobrenome}`,
                email: `${nome.toLowerCase()}.${sobrenome.toLowerCase()}@cetesb.sp.gov.br`,
                cargo: document.getElementById('cargo').value,
                senha: "hepta123"
            };

            await fetch('/api/usuarios', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });

            alert("✅ Usuário criado com sucesso!");
            fecharModal();
            carregarTabela();
        });

        async function excluir(id) {
            if (currentUser.cargo !== 'Administrador') return;
            if (confirm("Excluir este usuário?")) {
                await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
                carregarTabela();
            }
        }

        function editar(id) {
            if (currentUser.cargo !== 'Administrador') return alert("Edição de usuário em breve...");
        }

        function abrirModalCadastro() {
            if (currentUser.cargo !== 'Administrador') return alert("Apenas Administradores podem criar usuários.");
            document.getElementById('modalCadastro').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modalCadastro').classList.add('hidden');
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        window.onload = () => {
            updateUserHeader();
            showAdminButtons();
            carregarTabela();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Controle de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style> 
        body { font-family: 'Inter', system_ui, sans-serif; } 
        canvas { max-height: 260px !important; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-[#1a2537] text-white flex flex-col">
        <div class="p-6 border-b border-[#2a3a50]">
            <div class="text-2xl font-bold">Hepta / Cetesb</div>
            <div class="text-sm text-blue-400 mt-1">Controle de Inventário</div>
        </div>
        <nav class="flex-1 p-4">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="equipamentos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-laptop"></i> Equipamentos</a>
            <a href="perifericos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-mouse"></i> Periféricos</a>
            <a href="componentes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl mb-1"><i class="fas fa-microchip"></i> Componentes</a>
            <a href="usuarios.html" class="flex items-center gap-3 px-4 py-3 hover:bg-[#2a3a50] rounded-xl"><i class="fas fa-users"></i> Usuários</a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Sair</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-semibold">Dashboard</h1>
            <div class="flex items-center gap-4">
                <div id="userHeader" class="flex items-center gap-3 pl-6 border-l border-gray-200"></div>
            </div>
        </header>

        <div class="p-8 overflow-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="cardsContainer"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
                <!-- Status Geral -->
                <div class="bg-white rounded-3xl p-6 shadow">
                    <h3 class="font-semibold text-lg mb-4">Status Geral dos Ativos</h3>
                    <canvas id="statusChart"></canvas>
                </div>
                
                <!-- Distribuição por Categoria -->
                <div class="bg-white rounded-3xl p-6 shadow">
                    <h3 class="font-semibold text-lg mb-4">Distribuição por Categoria</h3>
                    <canvas id="categoriaChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{"nome":"Usuário","cargo":"Analista"}');

        function updateUserHeader() {
            document.getElementById('userHeader').innerHTML = `
                <i class="fas fa-bell text-2xl"></i>
                <div>
                    <p class="font-medium">${currentUser.nome}</p>
                    <p class="text-sm text-gray-500">${currentUser.cargo}</p>
                </div>
            `;
        }

        async function carregarDashboard() {
            try {
                const [eqRes, periRes, compRes] = await Promise.all([
                    fetch('/api/equipamentos'),
                    fetch('/api/perifericos'),
                    fetch('/api/componentes')
                ]);

                const equipamentos = await eqRes.json();
                const perifericos = await periRes.json();
                const componentes = await compRes.json();

                const total = equipamentos.length + perifericos.length + componentes.length;

                // Cards
                document.getElementById('cardsContainer').innerHTML = `
                    <div class="bg-blue-600 text-white rounded-3xl p-6">
                        <p class="text-sm opacity-75">Total Ativos</p>
                        <p class="text-5xl font-bold mt-2">${total}</p>
                    </div>
                    <div class="bg-white rounded-3xl p-6 shadow">
                        <p class="text-sm text-gray-500">Equipamentos</p>
                        <p class="text-4xl font-bold mt-2">${equipamentos.length}</p>
                    </div>
                    <div class="bg-white rounded-3xl p-6 shadow">
                        <p class="text-sm text-gray-500">Periféricos</p>
                        <p class="text-4xl font-bold mt-2">${perifericos.length}</p>
                    </div>
                    <div class="bg-white rounded-3xl p-6 shadow">
                        <p class="text-sm text-gray-500">Componentes</p>
                        <p class="text-4xl font-bold mt-2">${componentes.length}</p>
                    </div>
                `;

                // Contagem de Status (todos os itens juntos)
                const todosItens = [...equipamentos, ...perifericos, ...componentes];

                const statusCount = {
                    'Disponível': 0,
                    'Em uso': 0,
                    'Manutenção': 0,
                    'Offline': 0
                };

                todosItens.forEach(item => {
                    const status = item.status || 'Offline';
                    if (statusCount[status] !== undefined) {
                        statusCount[status]++;
                    } else {
                        statusCount['Offline']++;
                    }
                });

                // Gráfico de Status (Pizza)
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Disponível', 'Em uso', 'Manutenção', 'Offline'],
                        datasets: [{
                            data: [
                                statusCount['Disponível'],
                                statusCount['Em uso'],
                                statusCount['Manutenção'],
                                statusCount['Offline']
                            ],
                            backgroundColor: ['#10b981', '#3b82f6', '#ef4444', '#6b7280']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });

                // Gráfico de Barras
                new Chart(document.getElementById('categoriaChart'), {
                    type: 'bar',
                    data: {
                        labels: ['Equipamentos', 'Periféricos', 'Componentes'],
                        datasets: [{
                            label: 'Quantidade',
                            data: [equipamentos.length, perifericos.length, componentes.length],
                            backgroundColor: ['#3b82f6', '#10b981', '#8b5cf6']
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true } }
                    }
                });

            } catch (error) {
                console.error("Erro ao carregar dashboard:", error);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        window.onload = () => {
            updateUserHeader();
            carregarDashboard();
        };
    </script>
</body>
</html>

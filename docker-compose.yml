version: '3.8'

services:
  db:
    image: postgres:15
    container_name: inventario_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: hepta123
      POSTGRES_DB: inventario
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: inventario_app
    restart: always
    ports:
      - "3005:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: